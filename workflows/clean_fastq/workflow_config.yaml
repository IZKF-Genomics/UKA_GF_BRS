# Workflow: clean_fastq
# Clean files/directories in FASTQ run folders by patterns, without archiving.

id: clean_fastq
description: "Clean FASTQ run folders by removing pattern-matched content without archiving."

params:
  source_root:
    type: str
    cli: "--source-root"
    required: false
    default: "/data/fastq"
    description: "Root directory containing flat run directories."
  retention_days:
    type: int
    cli: "--retention-days"
    required: false
    default: 90
    description: "Runs newer than this many days are retained and not cleaned."
  clean_patterns:
    type: str
    cli: "--clean-patterns"
    required: false
    default: "*.fastq.gz,*.fq.gz,.pixi,work,.renv,.Rproj.user,.nextflow,.nextflow.log*"
    description: "Comma-separated patterns to remove. Default patterns are always enforced."
  skip_runs:
    type: str
    cli: "--skip-runs"
    required: false
    default: ""
    description: "Comma-separated run IDs to exclude from cleaning."
  non_interactive:
    type: bool
    cli: "--non-interactive"
    required: false
    default: false
    description: "Cron-safe mode shortcut: sets interactive=false and yes=true."
  interactive:
    type: bool
    required: false
    default: true
    description: "Enable interactive prompts."
  yes:
    type: bool
    cli: "--yes"
    required: false
    default: false
    description: "Skip final global confirmation prompt and proceed non-interactively."
  dry_run:
    type: bool
    cli: "--dry-run"
    required: false
    default: false
    description: "Plan only; do not delete anything."
  manifest_path:
    type: str
    required: false
    description: "Optional output path for manifest JSON."
  manifest_dir:
    type: str
    required: false
    default: "/data/shared/bpm_manifests"
    description: "Directory used for default manifest/log output when manifest_path is not set."

run:
  entry: "run.py"

tools:
  required: [python]
