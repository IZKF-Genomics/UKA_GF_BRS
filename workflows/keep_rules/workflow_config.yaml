# Workflow: keep_rules
# Manage keep-rules used to preserve selected runs from archive/cleanup operations.

id: keep_rules
description: "Manage keep rules (list/add/remove/prune) in /data/shared/bpm_manifests/keep_rules.yaml."

params:
  action:
    type: str
    cli: "--action"
    required: false
    default: "interactive"
    description: "Action to run: interactive, list, add, remove, prune."
  tui:
    type: bool
    cli: "--tui"
    required: false
    default: true
    description: "Enable TUI mode for action=interactive (default true)."
  browse_root:
    type: str
    cli: "--browse-root"
    required: false
    default: "/data/fastq"
    description: "Root path scanned by TUI browser for run IDs."
  run_id:
    type: str
    cli: "--run-id"
    required: false
    description: "Single run ID for add/remove."
  run_ids:
    type: str
    cli: "--run-ids"
    required: false
    description: "Comma-separated run IDs for add/remove."
  keep_until:
    type: str
    cli: "--keep-until"
    required: false
    description: "Optional expiry date for keep entry (YYYY-MM-DD)."
  rules_path:
    type: str
    cli: "--rules-path"
    required: false
    default: "/data/shared/bpm_manifests/keep_rules.yaml"
    description: "Path to keep-rules YAML file."
  source_roots:
    type: str
    cli: "--source-roots"
    required: false
    default: "/data/raw,/data/fastq"
    description: "Comma-separated source roots used by prune to detect stale run IDs."
  apply:
    type: bool
    cli: "--apply"
    required: false
    default: false
    description: "For prune action: apply deletion of stale entries."
  non_interactive:
    type: bool
    cli: "--non-interactive"
    required: false
    default: false
    description: "Cron-safe shortcut: sets interactive=false and yes=true."
  interactive:
    type: bool
    required: false
    default: true
    description: "Enable interactive prompts."
  yes:
    type: bool
    cli: "--yes"
    required: false
    default: false
    description: "Skip final confirmation prompts where applicable."

run:
  entry: "run.py"

tools:
  required: [python]
