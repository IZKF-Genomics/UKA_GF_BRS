# Workflow: archive_fastq
# Archive old FASTQ run directories with rsync and verification.
# This workflow does not delete source data; use archive_cleanup for deletion.

id: archive_fastq
description: "Archive old FASTQ run directories and write a cleanup manifest."

params:
  source_root:
    type: str
    cli: "--source-root"
    required: false
    default: "/data/fastq"
    description: "Root directory containing flat run directories (no instrument-level folders)."
  target_root:
    type: str
    cli: "--target-root"
    required: false
    default: "/mnt/nextgen2/archive/fastq"
    description: "Archive root directory containing instrument folders."
  retention_days:
    type: int
    cli: "--retention-days"
    required: false
    default: 90
    description: "Runs newer than this many days are retained and not archived."
  instrument_folders:
    type: str
    cli: "--instrument-folders"
    required: false
    default: "miseq1_M00818,miseq2_M04404,miseq3_M00403,nextseq500_NB501289,novaseq_A01742"
    description: "Compatibility parameter; ignored for archive_fastq flat layout."
  skip_runs:
    type: str
    cli: "--skip-runs"
    required: false
    default: ""
    description: "Comma-separated run IDs to exclude from archive even if old enough."
  non_interactive:
    type: bool
    cli: "--non-interactive"
    required: false
    default: false
    description: "Cron-safe mode shortcut: sets interactive=false and yes=true."
  interactive:
    type: bool
    required: false
    default: true
    description: "Enable interactive prompts for path/retention confirmation and skip selection."
  yes:
    type: bool
    cli: "--yes"
    required: false
    default: false
    description: "Skip final global confirmation prompt and proceed non-interactively."
  dry_run:
    type: bool
    cli: "--dry-run"
    required: false
    default: false
    description: "Plan only; do not copy."
  min_free_gb:
    type: int
    required: false
    default: 500
    description: "Minimum free space required on target filesystem before starting."
  manifest_path:
    type: str
    required: false
    description: "Optional output path for manifest JSON."
  manifest_dir:
    type: str
    required: false
    default: "/data/shared/bpm_manifests"
    description: "Directory used for default manifest/log output when manifest_path is not set."
  keep_rules_path:
    type: str
    cli: "--keep-rules-path"
    required: false
    default: "/data/shared/bpm_manifests/keep_rules.yaml"
    description: "YAML keep-rules file; active keep entries are excluded from archive selection."
  exclude_patterns:
    type: str
    cli: "--exclude-patterns"
    required: false
    default: "*.fastq.gz,*.fq.gz,.pixi,work,.renv,.Rproj.user,.nextflow,.nextflow.log*"
    description: "Comma-separated rsync exclude patterns. Default excludes preserve FASTQs and workflow/runtime caches."

run:
  entry: "run.py"

tools:
  required: [python, rsync]
