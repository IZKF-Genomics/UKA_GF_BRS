  - label: dog
    taxid: 9615
    fasta_url: "https://ftp.ensembl.org/pub/current_fasta/canis_lupus_familiaris/dna/Canis_lupus_familiaris.ROS_Cfam_1.0.dna.toplevel.fa.gz"
    filename: "dog.fa.gz"
    enabled: true
    fastq_screen_label: "Dog"
  - label: cat
    taxid: 9685
    fasta_url: "https://ftp.ensembl.org/pub/current_fasta/felis_catus/dna/Felis_catus.F.catus_Fca126_mat1.0.dna.toplevel.fa.gz"
    filename: "cat.fa.gz"
    enabled: true
