# Shared contamination-database builder configuration.
# Edit the panel name, version, read lengths, and species URLs before running.

root_dir: "/data/shared/contamination_db"
panel_name: "vertebrate_panel"
db_version: "v2026.03"
threads: 32
cleanup_staging: true
force: false
kraken2_base: "standard"
kraken2_use_ftp: true

build:
  kraken2: true
  bracken: true
  fastq_screen: true

paths:
  kraken2_root: "/data/shared/contamination_db/kraken2"
  bracken_root: "/data/shared/contamination_db/bracken"
  fastq_screen_root: "/data/shared/contamination_db/fastq_screen"

bracken:
  read_lengths: [75, 100, 151]

species:
  # Replace the placeholder URLs below with the exact FASTA sources you want to use.
  # Keep the taxids as shown unless you intentionally change species.
  - label: human
    taxid: 9606
    fasta_url: "https://ftp.ensembl.org/pub/current_fasta/homo_sapiens/dna/Homo_sapiens.GRCh38.dna.primary_assembly.fa.gz"
    filename: "human.fa.gz"
    enabled: true
    fastq_screen_label: "Human"
  - label: mouse
    taxid: 10090
    fasta_url: "https://ftp.ensembl.org/pub/current_fasta/mus_musculus/dna/Mus_musculus.GRCm39.dna.primary_assembly.fa.gz"
    filename: "mouse.fa.gz"
    enabled: true
    fastq_screen_label: "Mouse"
  - label: rat
    taxid: 10116
    fasta_url: "https://ftp.ensembl.org/pub/current_fasta/rattus_norvegicus/dna/Rattus_norvegicus.GRCr8.dna.toplevel.fa.gz"
    filename: "rat.fa.gz"
    enabled: true
    fastq_screen_label: "Rat"
  - label: zebrafish
    taxid: 7955
    fasta_url: "https://ftp.ensembl.org/pub/current_fasta/danio_rerio/dna/Danio_rerio.GRCz11.dna.primary_assembly.fa.gz"
    filename: "zebrafish.fa.gz"
    enabled: true
    fastq_screen_label: "Zebrafish"
  - label: pig
    taxid: 9823
    fasta_url: "https://ftp.ensembl.org/pub/current_fasta/sus_scrofa/dna/Sus_scrofa.Sscrofa11.1.dna.toplevel.fa.gz"
    filename: "pig.fa.gz"
    enabled: true
    fastq_screen_label: "Pig"
  - label: cow
    taxid: 9913
    fasta_url: "https://ftp.ensembl.org/pub/current_fasta/bos_taurus/dna/Bos_taurus.ARS-UCD2.0.dna.toplevel.fa.gz"
    filename: "cow.fa.gz"
    enabled: true
    fastq_screen_label: "Cow"
  - label: chicken
    taxid: 9031
    fasta_url: "https://ftp.ensembl.org/pub/current_fasta/gallus_gallus/dna/Gallus_gallus.bGalGal1.mat.broiler.GRCg7b.dna.toplevel.fa.gz"
    filename: "chicken.fa.gz"
    enabled: true
