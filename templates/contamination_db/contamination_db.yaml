# Shared contamination-database builder configuration.
# Edit the panel name, version, read lengths, and species URLs before running.

root_dir: "/data/shared/contamination_db"
panel_name: "vertebrate_panel"
db_version: "v2026.03"
threads: 32
cleanup_staging: true
force: false
kraken2_base: "standard"

build:
  kraken2: true
  bracken: true
  fastq_screen: true

paths:
  kraken2_root: "/data/shared/contamination_db/kraken2"
  bracken_root: "/data/shared/contamination_db/bracken"
  fastq_screen_root: "/data/shared/contamination_db/fastq_screen"

bracken:
  read_lengths: [75, 100, 151]

species:
  # Replace the placeholder URLs below with the exact FASTA sources you want to use.
  # Keep the taxids as shown unless you intentionally change species.
  - label: human
    taxid: 9606
    fasta_url: "https://example.org/genomes/human.fa.gz"
    enabled: true
    fastq_screen_label: "Human"
  - label: mouse
    taxid: 10090
    fasta_url: "https://example.org/genomes/mouse.fa.gz"
    enabled: true
    fastq_screen_label: "Mouse"
  - label: rat
    taxid: 10116
    fasta_url: "https://example.org/genomes/rat.fa.gz"
    enabled: true
    fastq_screen_label: "Rat"
  - label: zebrafish
    taxid: 7955
    fasta_url: "https://example.org/genomes/zebrafish.fa.gz"
    enabled: true
    fastq_screen_label: "Zebrafish"
  - label: pig
    taxid: 9823
    fasta_url: "https://example.org/genomes/pig.fa.gz"
    enabled: true
    fastq_screen_label: "Pig"
  - label: cow
    taxid: 9913
    fasta_url: "https://example.org/genomes/cow.fa.gz"
    enabled: true
    fastq_screen_label: "Cow"
  - label: chicken
    taxid: 9031
    fasta_url: "https://example.org/genomes/chicken.fa.gz"
    enabled: true
