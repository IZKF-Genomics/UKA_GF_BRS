[workspace]
name = "illumina_methylation_compare"
channels = ["conda-forge", "bioconda", "r"]
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
render = { cmd = ["bash", "-lc", "quarto render steps/01_dmp.qmd --output-dir reports && quarto render steps/02_dmr.qmd --output-dir reports && quarto render steps/03_enrichment.qmd --output-dir reports && quarto render steps/04_drilldown.qmd --output-dir reports && quarto render steps/00_index.qmd --output-dir reports"] }
clean = { cmd = ["bash", "-lc", "rm -rf reports results"] }
sync-samples = { cmd = ["Rscript", "scripts/sync_samples_from_inputs.R"] }
check = { cmd = ["Rscript", "-e", "source('common.R'); cfg <- load_config('config/project.toml'); smp <- load_samples('config/samples.csv'); ensure_dirs('.'); validate_project(cfg, smp)"] }

[dependencies]
quarto = ">=1.6,<2"
pandoc = ">=3,<4"
r-base = ">=4.3,<4.6"
r-rcpptoml = ">=0.2,<0.3"
r-readr = ">=2.1,<3"
r-dplyr = ">=1.1,<2"
r-tibble = ">=3.2,<4"
r-stringr = ">=1.5,<2"
r-purrr = ">=1.0,<2"
r-tidyr = ">=1.3,<2"
r-ggplot2 = ">=3.5,<4"
r-ggrepel = ">=0.9,<1"
r-matrixstats = ">=1.5,<2"
r-dt = ">=0.33,<1"
r-rcolorbrewer = ">=1.1_3,<2"
bioconductor-minfi = ">=1.48,<2"
bioconductor-limma = ">=3.58,<4"
bioconductor-missmethyl = ">=1.36,<2"
bioconductor-bumphunter = ">=1.44,<2"
bioconductor-annotationdbi = ">=1.64,<2"
bioconductor-genomeinfodbdata = ">=1.2,<2"
bioconductor-illuminahumanmethylation450kmanifest = ">=0.4,<1"
"bioconductor-illuminahumanmethylation450kanno.ilmn12.hg19" = ">=0.6,<1"
bioconductor-illuminahumanmethylationepicmanifest = ">=0.3,<1"
"bioconductor-illuminahumanmethylationepicanno.ilm10b4.hg19" = ">=0.6,<1"
bioconductor-illuminahumanmethylationepicv2manifest = ">=1.0,<2"
"bioconductor-illuminahumanmethylationepicv2anno.20a1.hg38" = ">=1.0,<2"
