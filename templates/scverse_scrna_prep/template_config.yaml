id: scverse_scrna_prep
description: "scverse/Scanpy single-cell RNA-seq preprocessing from nf-core/scrnaseq H5AD outputs."

params:
  input_h5ad:
    type: str
    cli: "--input-h5ad"
    required: false
    default: ""
    description: "Input H5AD matrix; defaults to nfcore_scrnaseq published nfcore_scrnaseq_res_mt when available"
  sample_metadata:
    type: str
    cli: "--sample-metadata"
    required: false
    default: ""
    description: "Optional sample metadata CSV with a sample_id column; defaults to config/samples.csv scaffold"
  organism:
    type: str
    cli: "--organism"
    required: false
    default: ""
    description: "Organism name for QC feature prefixes; auto-filled from any upstream params.organism when available"
  batch_key:
    type: str
    cli: "--batch-key"
    required: false
    default: "batch"
    description: "Primary batch column in AnnData.obs / sample metadata"
  condition_key:
    type: str
    cli: "--condition-key"
    required: false
    default: "condition"
    description: "Primary condition column in AnnData.obs / sample metadata"
  sample_id_key:
    type: str
    cli: "--sample-id-key"
    required: false
    default: "sample_id"
    description: "Preferred sample identifier column"
  doublet_method:
    type: str
    cli: "--doublet-method"
    required: false
    default: "none"
    description: "Doublet scoring method placeholder (currently: none or scrublet label placeholder)"
  min_genes:
    type: int
    cli: "--min-genes"
    required: false
    default: 200
    description: "Minimum genes detected per cell"
  min_cells:
    type: int
    cli: "--min-cells"
    required: false
    default: 3
    description: "Minimum cells expressing a gene"
  min_counts:
    type: int
    cli: "--min-counts"
    required: false
    default: 500
    description: "Minimum UMI counts per cell"
  max_pct_counts_mt:
    type: float
    cli: "--max-pct-counts-mt"
    required: false
    default: 20.0
    description: "Maximum mitochondrial percentage for QC pass filtering"
  n_top_hvgs:
    type: int
    cli: "--n-top-hvgs"
    required: false
    default: 3000
    description: "Number of highly variable genes to flag"
  n_pcs:
    type: int
    cli: "--n-pcs"
    required: false
    default: 30
    description: "Number of principal components for neighbors and UMAP"
  n_neighbors:
    type: int
    cli: "--n-neighbors"
    required: false
    default: 15
    description: "Number of neighbors for graph construction"
  leiden_resolution:
    type: str
    cli: "--leiden-resolution"
    required: false
    default: ""
    description: "Optional Leiden resolution override; when omitted, a heuristic value is chosen after QC"

render:
  into: "${ctx.project_dir}/${ctx.template.id}/"
  files:
    - README.md -> README.md
    - pixi.toml -> pixi.toml
    - run.sh.j2 -> run.sh
    - .gitignore -> .gitignore
    - config/project.toml.j2 -> config/project.toml
    - config/samples.csv -> config/samples.csv
    - scripts/run_prep.py -> scripts/run_prep.py
    - 00_qc.qmd.j2 -> 00_qc.qmd

run:
  entry: "run.sh"

hooks:
  pre_render:
    - hooks.scverse_scrna_prep_defaults:populate

publish:
  scrna_prep_h5ad:
    resolver: "resolvers.get_scrna_prep_h5ad"

tools:
  required: [pixi, quarto, jupyter]
  optional: []
