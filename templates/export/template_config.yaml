id: export
description: "Generate and submit export job specs from a rule-based mapping table."

params:
  export_engine_api_url:
    type: str
    required: false
    default: "http://genomics.rwth-aachen.de:9500"
    description: "Base URL for the export engine API (no trailing /export)"
  export_engine_backends:
    type: str
    required: false
    default: "apache, owncloud, sftp"
    description: "Comma-separated list of export backends"
  export_expiry_days:
    type: int
    required: false
    default: 30
    description: "Optional expiry_days for export engine job spec"
  agendo_id:
    type: str
    required: false
    cli: "--agendo-id"
    description: "Optional override Agendo ID for metadata lookup (auto-discovered from project.yaml if omitted)"
  flowcell_id:
    type: str
    required: false
    cli: "--flowcell-id"
    description: "Optional override flowcell ID for metadata lookup (auto-discovered from project.yaml if omitted)"
  metadata_source:
    type: str
    required: false
    cli: "--metadata-source"
    default: "auto"
    description: "Metadata input mode: auto|api|file|mock|none"
  metadata_file:
    type: str
    required: false
    cli: "--metadata-file"
    description: "Optional local JSON/YAML metadata payload path (used in file mode, preferred in auto when provided)"
  metadata_api_url:
    type: str
    required: false
    cli: "--metadata-api-url"
    default: "https://genomics.rwth-aachen.de/api"
    description: "Metadata API base URL"
  metadata_api_endpoint:
    type: str
    required: false
    cli: "--metadata-api-endpoint"
    default: "/project-output"
    description: "Metadata API endpoint path appended to metadata_api_url"
  metadata_api_timeout:
    type: int
    required: false
    cli: "--metadata-api-timeout"
    default: 20
    description: "Metadata API timeout in seconds"

tools:
  required: [python]

render:
  into: "${ctx.project_dir}/${ctx.template.id}/"
  files:
    - run.py -> run.py

run:
  entry: "run.py"

hooks:
  post_render:
    - hooks.export_build_spec:main
    - hooks.export_fetch_metadata:main
