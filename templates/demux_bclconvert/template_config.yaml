id: demux_bclconvert
description: Demultiplex Illumina BCLs using bcl-convert, then run Pixi-managed Falco QC, optional contamination screening, and MultiQC.

params:
  bcl_dir:
    type: str
    required: true
    cli: "--bcl"
    exists: dir
    description: "Input BCL run directory (contains RunInfo.xml)"
  use_api_samplesheet:
    type: bool
    default: true
    cli: "--api-samplesheet"
    description: "Fetch SampleSheet.csv from the GF API"
  gf_api_name:
    type: str
    cli: "--api-user"
    description: "GF API username for SampleSheet retrieval"
  gf_api_pass:
    type: str
    cli: "--api-pass"
    description: "GF API password or token"
  agendo_id:
    type: str
    cli: "--agendo-id"
    description: "Agendo request ID to fetch samplesheet when flowcell ID is unavailable"
  run_fastq_screen:
    type: bool
    default: false
    cli: "--fastq-screen"
    description: "Backward-compatibility switch: if contamination_method=none, use fastq_screen"
  contamination_method:
    type: str
    default: "none"
    cli: "--contamination-method"
    description: "Contamination backend: none, fastq_screen, kraken2, or kraken2_bracken"
  kraken2_db:
    type: str
    default: "/data/shared/databases/kraken2/standard/current"
    cli: "--kraken2-db"
    description: "Shared Kraken2 database path used for kraken2 or kraken2_bracken"
  kraken2_confidence:
    type: float
    default: 0.0
    cli: "--kraken2-confidence"
    description: "Kraken2 confidence threshold"
  bracken_read_length:
    type: int
    default: 0
    cli: "--bracken-read-length"
    description: "Read length for Bracken database assets; set 0 to auto-detect from FASTQs"
  thread_ratio:
    type: float
    default: 0.8
    cli: "--thread-ratio"
    description: "Fraction of idle CPUs to assign per bcl-convert thread pool (0-1)"
  no_lane_splitting:
    type: bool
    default: true
    description: "Do not split FASTQs by lane (single file per read)"
  sampleproject_subdirs:
    type: bool
    default: false
    description: "Organize FASTQs under SampleProject/ subdirectories"


tools:
  required: [bcl-convert, pixi]
  optional: [mpstat]

render:
  into: "${ctx.project_dir}/${ctx.template.id}/"
  adhoc_out_resolver: "resolvers.demux_out_from_bcl"
  files:
    - samplesheet.csv -> samplesheet.csv
    - pixi.toml -> pixi.toml
    - run.sh.j2 -> run.sh
    - collect_versions.sh.j2 -> collect_versions.sh
    - build_fastq_manifest.py.j2 -> build_fastq_manifest.py
    - process_fastqs.py.j2 -> process_fastqs.py
    - get_threads.sh.j2 -> get_threads.sh
    - references.bib -> references.bib

run:
  entry: "run.sh"

hooks:
  post_render:
    - hooks.get_api_samplesheet:main

publish:
  multiqc_report:
    resolver: "resolvers.get_multiqc_report"
  FASTQ_dir:
    resolver: "resolvers.get_FASTQ_folder"
